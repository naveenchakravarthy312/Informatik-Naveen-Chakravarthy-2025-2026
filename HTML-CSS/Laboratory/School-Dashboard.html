<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LGBK-OS / Minimal Edition</title>
    <style>
        :root {
            --gh-bg: #0d1117;
            --gh-sub: #161b22;
            --gh-border: #30363d;
            --gh-text: #c9d1d9;
            --gh-blue: #58a6ff;
            --gh-green: #238636;
            --lgbk-red: #f85149;
            --radius: 6px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--gh-bg);
            color: var(--gh-text);
            margin: 0;
            display: flex;
            height: 100vh;
        }

        /* --- Compact Sidebar --- */
        .sidebar {
            width: 65px;
            background: var(--gh-sub);
            border-right: 1px solid var(--gh-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 0;
        }

        .sidebar h2 { 
            font-size: 10px; 
            color: #8b949e; 
            margin-bottom: 16px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .nav-item {
            width: 45px;
            height: 45px;
            margin-bottom: 12px;
            cursor: pointer;
            border-radius: var(--radius);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .nav-item:hover { background: #21262d; }
        .nav-item.active { 
            background: #1f6feb; 
            color: white; 
            box-shadow: 0 0 10px rgba(31, 111, 235, 0.4);
        }

        /* --- Main Content --- */
        .main-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        .gh-card {
            background: var(--gh-sub);
            border: 1px solid var(--gh-border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 24px;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* --- Calendar Styling --- */
        .cal-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        .cal-table th {
            color: #8b949e;
            padding: 10px;
            font-weight: 400;
            border-bottom: 1px solid var(--gh-border);
        }
        .cal-table td {
            padding: 15px 5px;
            border: 1px solid #21262d;
            border-radius: var(--radius);
        }
        .today {
            background: var(--gh-blue);
            color: white;
            font-weight: bold;
            border-radius: var(--radius);
        }

        /* --- Global Elements --- */
        input, textarea {
            background: var(--gh-bg);
            border: 1px solid var(--gh-border);
            color: var(--gh-text);
            padding: 12px;
            border-radius: var(--radius);
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            background: var(--gh-green);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
        }

        /* --- Calculator --- */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { 
            background: #21262d; 
            border: 1px solid var(--gh-border); 
            padding: 18px; 
            text-align: center; 
            border-radius: var(--radius); 
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Menu</h2>
    <div class="nav-item active" onclick="showTab('home', this)" title="Home">🏠</div>
    <div class="nav-item" onclick="showTab('notes', this)" title="Notes">📝</div>
    <div class="nav-item" onclick="showTab('calc', this)" title="Calculator">🧮</div>
    <div class="nav-item" onclick="showTab('cal', this)" title="Calendar">📅</div>
</div>

<div class="main-content">
    <div class="container">
        
        <div class="header-lgbk">
            <h1 style="font-size: 22px; color: white;">School Dashboard</h1>
        </div>

        <div id="home" class="tab-content active">
            <div class="gh-card">
                <div id="clock" style="font-size: 32px; font-weight: bold; color: var(--gh-blue);">00:00:00</div>
                <p style="color: #8b949e; margin: 0;">Düsseldorf, Germany</p>
            </div>
            <div class="gh-card">
                <h3 style="margin-top: 0;">Issues (To-Do List)</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="todoInput" placeholder="New task...">
                    <button onclick="addTodo()">Commit</button>
                </div>
                <ul id="todoList" style="list-style: none; padding: 0; margin-top: 15px;"></ul>
            </div>
        </div>

        <div id="notes" class="tab-content">
            <div class="gh-card">
                <textarea id="notePad" rows="18" placeholder="Start typing..." oninput="saveNotes()"></textarea>
            </div>
        </div>

        <div id="calc" class="tab-content">
            <div class="gh-card" style="max-width: 350px; margin: auto;">
                <div id="screen" style="text-align: right; font-size: 2rem; padding: 15px; background: #000; color: #39d353; border-radius: 4px; margin-bottom: 15px;">0</div>
                <div class="calc-grid">
                    <div class="calc-btn" style="color: var(--lgbk-red);" onclick="clr()">C</div>
                    <div class="calc-btn" onclick="press('/')">/</div>
                    <div class="calc-btn" onclick="press('*')">×</div>
                    <div class="calc-btn" onclick="press('-')">-</div>
                    <div class="calc-btn" onclick="press('7')">7</div>
                    <div class="calc-btn" onclick="press('8')">8</div>
                    <div class="calc-btn" onclick="press('9')">9</div>
                    <div class="calc-btn" onclick="press('+')">+</div>
                    <div class="calc-btn" onclick="press('4')">4</div>
                    <div class="calc-btn" onclick="press('5')">5</div>
                    <div class="calc-btn" onclick="press('6')">6</div>
                    <div class="calc-btn" style="background: var(--gh-green); color: white;" onclick="calculate()">=</div>
                    <div class="calc-btn" onclick="press('1')">1</div>
                    <div class="calc-btn" onclick="press('2')">2</div>
                    <div class="calc-btn" onclick="press('3')">3</div>
                    <div class="calc-btn" onclick="press('0')">0</div>
                </div>
            </div>
        </div>

        <div id="cal" class="tab-content">
            <div class="gh-card">
                <h3 id="monthYear" style="margin-top: 0; color: var(--gh-blue);">April 2026</h3>
                <table class="cal-table">
                    <thead>
                        <tr><th>Mo</th><th>Di</th><th>Mi</th><th>Do</th><th>Fr</th><th>Sa</th><th>So</th></tr>
                    </thead>
                    <tbody id="calBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    function showTab(id, el) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        el.classList.add('active');
        if (id === 'cal') buildCal();
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('de-DE');
    }, 1000);

    function buildCal() {
        const now = new Date();
        const month = now.getMonth();
        const year = now.getFullYear();
        document.getElementById('monthYear').innerText = now.toLocaleString('default', { month: 'long' }) + " " + year;

        const firstDay = new Date(year, month, 0).getDay(); // Monday start
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        let body = document.getElementById('calBody');
        body.innerHTML = "";
        
        let date = 1;
        for (let i = 0; i < 6; i++) {
            let row = document.createElement("tr");
            for (let j = 0; j < 7; j++) {
                let cell = document.createElement("td");
                if (i === 0 && j < firstDay) {
                    cell.innerText = "";
                } else if (date > daysInMonth) {
                    break;
                } else {
                    cell.innerText = date;
                    if (date === now.getDate()) cell.className = "today";
                    date++;
                }
                row.appendChild(cell);
            }
            body.appendChild(row);
            if (date > daysInMonth) break;
        }
    }

    function addTodo() {
        const val = document.getElementById('todoInput').value;
        if(!val) return;
        const li = document.createElement('li');
        li.style = "border-bottom: 1px solid var(--gh-border); padding: 12px 0; display: flex; justify-content: space-between;";
        li.innerHTML = `<span>🟢 ${val}</span> <span style="cursor:pointer; color:var(--lgbk-red)" onclick="this.parentElement.remove()">Close</span>`;
        document.getElementById('todoList').prepend(li);
        document.getElementById('todoInput').value = "";
    }

    function saveNotes() { localStorage.setItem('gh_notes', document.getElementById('notePad').value); }
    document.getElementById('notePad').value = localStorage.getItem('gh_notes') || "";

    let screen = document.getElementById('screen');
    function press(v) { if(screen.innerText === "0") screen.innerText = v; else screen.innerText += v; }
    function clr() { screen.innerText = "0"; }
    function calculate() { try { screen.innerText = eval(screen.innerText); } catch { screen.innerText = "Error"; } }
</script>

</body>
</html>
