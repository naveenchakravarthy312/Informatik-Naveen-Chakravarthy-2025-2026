<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUS-Transit / GitHub Edition</title>
    <style>
        :root {
            --gh-bg: #0d1117;
            --gh-sub: #161b22;
            --gh-border: #30363d;
            --gh-text: #c9d1d9;
            --gh-blue: #58a6ff;
            --gh-green: #238636;
            --radius: 8px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--gh-bg);
            color: var(--gh-text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--gh-sub);
            border: 1px solid var(--gh-border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            padding: 20px;
            border-bottom: 1px solid var(--gh-border);
            text-align: center;
        }

        .search-section {
            padding: 20px;
            background: #0d1117;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: #161b22;
            border: 1px solid var(--gh-border);
            color: white;
            border-radius: var(--radius);
            box-sizing: border-box;
        }

        .btn-search {
            width: 100%;
            padding: 12px;
            background: var(--gh-blue);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: bold;
            cursor: pointer;
        }

        .results {
            padding: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .route-card {
            background: #21262d;
            border: 1px solid var(--gh-border);
            border-radius: var(--radius);
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .route-card:hover { border-color: var(--gh-blue); }

        .line-badge {
            background: var(--gh-green);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 14px;
        }

        .time { color: var(--gh-blue); font-weight: bold; }
        .delay { color: #f85149; font-size: 12px; margin-left: 5px; }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #39d353;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <h2 style="margin:0">🚆 DUS-Transit <span style="font-size: 12px; color: var(--gh-blue);">v1.0</span></h2>
        <small style="color: #8b949e;">Live Abfahrten Düsseldorf</small>
    </div>

    <div class="search-section">
        <input type="text" id="start" placeholder="Von: (z.B. Düsseldorf Hbf)">
        <input type="text" id="end" placeholder="Nach: (z.B. Lessing Gymnasium)">
        <button class="btn-search" onclick="findRoutes()">Route suchen</button>
    </div>

    <div class="results" id="routeResults">
        <div class="route-card">
            <div>
                <span class="line-badge">U75</span>
                <div style="margin-top:5px; font-size: 14px;">Richtung: Neuss Hbf</div>
            </div>
            <div style="text-align: right;">
                <div class="time">16:45</div>
                <div class="delay">+2 min</div>
            </div>
        </div>

        <div class="route-card">
            <div>
                <span class="line-badge" style="background:#8b949e">706</span>
                <div style="margin-top:5px; font-size: 14px;">Richtung: Am Steinberg</div>
            </div>
            <div style="text-align: right;">
                <div class="time">16:52</div>
                <div class="status-dot"></div><span style="font-size:12px">Pünktlich</span>
            </div>
        </div>
    </div>
</div>

<script>
    function findRoutes() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        
        if(!start || !end) {
            alert("Bitte Start und Ziel eingeben!");
            return;
        }

        // Simulating a search/API call
        const results = document.getElementById('routeResults');
        results.innerHTML = `<p style="text-align:center; color:#8b949e;">Suche nach Verbindungen von <b>${start}</b>...</p>`;

        setTimeout(() => {
            results.innerHTML = `
                <div class="route-card">
                    <div>
                        <span class="line-badge" style="background:#f85149">S11</span>
                        <div style="margin-top:5px; font-size: 14px;">D-Flughafen Terminal</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="time">Sofort</div>
                        <div class="delay">Pünktlich</div>
                    </div>
                </div>
                <div class="route-card">
                    <div>
                        <span class="line-badge">U79</span>
                        <div style="margin-top:5px; font-size: 14px;">D-Wittlaer</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="time">In 5 Min</div>
                        <div class="delay">+1 min</div>
                    </div>
                </div>
            `;
        }, 800);
    }
</script>

</body>
</html>
