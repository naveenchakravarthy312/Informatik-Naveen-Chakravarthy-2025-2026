<!DOCTYPE html>
<html>
<head>
  <style>
    .container {
      position: relative;
      display: inline-block;
    }
    .container img {
      display: block;
    }
    .label {
      position: absolute;
      bottom: 20px;
      left: 0;
      background: #e00;
      color: white;
      font-size: 15px;
      font-weight: 500;
      font-family: sans-serif;
      padding: 8px 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="Word-screenshot.png" alt="photo" width="100%">
    <div class="label">Screenshot LibreOffice</div>
  </div>
</body>
</html>
