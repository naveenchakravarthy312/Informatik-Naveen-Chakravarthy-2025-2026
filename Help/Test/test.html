<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Düsseldorf Info Boxes</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: grey;
            font-family: Arial, sans-serif;
        }
        .text-box {
            background-color: white;
            width: 200px;
            height: 120px;
            margin: 10px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 14px;
            line-height: 1.3;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-box">
            <h3>Düsseldorf</h3>
            <p>Capital of NRW<br>Population: ~620,000</p>
        </div>
        <div class="text-box">
            <h3>Rhein River</h3>
            <p>Longest river in Germany<br>1,230 km</p>
        </div>
    </div>
</body>
</html>
