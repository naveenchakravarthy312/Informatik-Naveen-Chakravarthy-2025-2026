<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="Einfache Buttons im Head">
    <title>Einfache Buttons im Head</title>
    <style>
        #roter-button {
            background-color: rgb(255, 255, 255);
            color: rgb(0, 0, 0);
            padding: 10px 20px;
            border: 3px solid rgb(255, 0, 0);
            border-radius: 5px;
            cursor: pointer;
        }
        #grüner-button {
            background-color: rgb(0, 255, 0);
            color: black;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        #blauer-button {
            background-color: rgb(0, 0, 255);
            color: white;
            padding: 10px 20px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <button id="roter-button">
        <b>Roter Button</b>
    </button>
    <button id="grüner-button">
        <b> Grüner Button</b>
    </button>
    <button id="blauer-button">
        <b>Blauer Button</b>
    </button>
</body>
</html>
