<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="Einfache Buttons">
    <title>Einfache Buttons</title>
</head>
<body>
    <button style="background-color: rgb(255, 255, 255); color: rgb(0, 0, 0); padding: 10px 20px; border: 3px solid rgb(255, 0, 0); border-radius: 5px; cursor: pointer;">
        <b>Roter Button</b>
    </button>
    <button style="background-color: rgb(0, 255, 0); color: black; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
        <b> Grüner Button</b>
    </button>
    <button style="background-color: rgb(0, 0, 255); color: white; padding: 10px 20px; border: none; cursor: pointer;">
        <b>Blauer Button</b>
    </button>
</body>
</html>
