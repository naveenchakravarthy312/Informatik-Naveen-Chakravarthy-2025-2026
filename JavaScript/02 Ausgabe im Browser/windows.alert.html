           window.alert("Hallo Welt");

<!-- 
Der Befehl window.alert("Hallo Welt"); lässt sich so aufschlüsseln:

    window: 
        Das ist das globale Objekt im Browser. Es repräsentiert das gesamte Browserfenster, 
        in dem die Webseite läuft. Da es das "oberste" Objekt ist, kann man das Wort window. 
        im Code oft auch einfach weglassen – ein einfaches alert("Hallo Welt"); funktioniert 
        exakt genau so.

    .alert(): 
        Das ist eine eingebaute Methode des window-Objekts. Sie hat die Aufgabe, ein kleines, 
        modales Benachrichtigungsfenster (ein sogenanntes Pop-up oder eine JavaScript-Warnmeldung) 
        im Browser aufzupoppen.

    "Hallo Welt": 
        Der Text, der als Nachricht im Inneren dieses Pop-up-Fensters angezeigt wird.

Sobald der Browser den <script>-Tag erreicht, stoppt er kurz das Laden des restlichen HTML-Inhalts. 
Ein kleines Dialogfenster öffnet sich mitten im Bildschirm mit dem Text "Hallo Welt" und einem 
"OK"-Button. Der Nutzer muss auf "OK" klicken, um das Fenster zu schließen. Erst danach läuft der 
Rest des Codes weiter und die Seite wird fertig geladen.

Schnelle Tests: 
    Um beim Programmieren auf die Schnelle zu überprüfen, ob ein bestimmter Klick oder ein 
    Skript überhaupt funktioniert.

Wichtige Warnungen: 
    Um dem Nutzer eine kritische Information mitzuteilen, die er auf keinen Fall übersehen 
    darf (z. B. "Bitte füllen Sie alle Pflichtfelder aus").

Hinweis für die Praxis: 
    In modernen Webseiten wird alert() eher selten für echte Nutzer verwendet, da es den Nutzer 
    im Lesefluss blockiert und oft als störend empfunden wird. Für das Lernen und Verstehen von 
    JavaScript-Abläufen ist es aber ein großartiges Werkzeug!
-->
