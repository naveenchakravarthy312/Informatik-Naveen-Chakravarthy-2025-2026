<!-- 
Der Befehl console.log("Hallo Welt"); lässt sich so beschreiben:

    console: Dies ist ein eingebautes Objekt im Browser, das Zugriff auf die Entwicklerkonsole (Developer Console) gewährt.

    .log(): Das ist eine Methode (Funktion) dieses Objekts. Sie hat die Aufgabe, eine Nachricht oder Daten direkt in die Konsole zu schreiben und dort auszudrucken.

    "Hallo Welt": Das ist das Argument (der Text), das an die Funktion übergeben wird. Dieser Text wird in der Konsole ausgegeben.
