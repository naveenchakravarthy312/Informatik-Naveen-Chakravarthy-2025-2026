<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <title>Übung C: Deltoid</title>
        <meta name="author" content="Naveen Chakravarthy Mohankumar">
        <meta name="date" content="30.04.2026">
        <style>
            .card {
                background: #357096;
                border-radius: 12px;
                padding: 20px;
                margin: 15px;
                box-shadow: 2px 2px 4px rgba(102, 102, 102, 0.7);
                text-align: center;
                border: 5px solid #024c7c;
            }
            input {
                display: block;
                margin: 10px 0;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
                width: 90%;
            }
            button {
                background-color: #024c7c;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
            }
            h1 {
                color: #ffffff;
            }
        </style>
    </head>

    <body>
        <div class="card">
            <h1>Übung C: Deltoid</h1>
            <script>
                function number() {
                    var a = document.getElementById("a").value;
                    var b = document.getElementById("b").value;
                    var f = document.getElementById("f").value;
                    var e = Math.sqrt(Math.pow(a, 2) - Math.pow(f/2, 2)) + Math.sqrt(Math.pow(b, 2) - Math.pow(f/2, 2));
                    var A = e * f / 2;
                    document.getElementById("answer").innerHTML = "Der Flächeninhalt beträgt = " + A + "<br>Der Umfang beträgt = " + e;
                    return;
                }
            </script>

            <input type="number" id="a" placeholder="a?">
            <input type="number" id="b" placeholder="b?">
            <input type="number" id="f" placeholder="f?">
            <button onClick="number();">Solve</button> 
            <p id="answer"></p>
        </div>
    </body>
</html>
