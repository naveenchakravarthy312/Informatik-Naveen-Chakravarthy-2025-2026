<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <title>Rabattberechnung</title>
        <meta name="author" content="Naveen Chakravarthy Mohankumar">
        <meta name="date" content="11.05.2026">
        
    </head>

    <body>
        <div class="card">
            <script>
                function Bestellen() {
                    var anzahl = document.getElementById("anzahl").value;
                    if (anzahl < 8) {
                        var rabatt = 1;
                        var percent = "0%";
                    }
                    if (anzahl >= 8) {
                        var rabatt = 0.95;
                        var percent = "5%";
                    }
                    if (anzahl > 16) {
                        var rabatt = 0.88;
                        var percent = "12%";
                    }
                    var price = anzahl * 12.40;
                    var sum = price * rabatt;
                    var output = "Sie haben " + anzahl + " Flachen bestellt!<br>" + "Sie bekommen " + percent + " Rabatt.<br>Brutto: €" + sum + " - Rabatt: " + percent + " = €" + price;
                    document.getElementById("output").innerHTML = output;
                }
            </script>

            <h1>Rabattberechnung</h1>
            <p>Wie viele Flachen á €12,40 möchten Sie bestellen?</p><br>
            <p>Anzahl:</p><input type="number" id="anzahl" placeholder="Anzahl eingeben"><p>Flachen</p>
            <button onclick="Bestellen()">Bestellen</button>
            <p id="output"></p>
        </div>
    </body>
</html>
