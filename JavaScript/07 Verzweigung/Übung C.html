<!doctype html>
<html lang="de">
    <head>
        <!-- Meta -->
        <meta charset="utf-8">
        <title>Systemvoraussetzungen</title>
        <meta name="author" content="Naveen Chakravarthy Mohankumar">
        <meta name="date" content="15.05.2026">

        <!-- Style -->
        <style>
            .card {
                background: #357096;
                border-radius: 12px;
                padding: 20px;
                margin: 15px;
                box-shadow: 2px 2px 4px rgba(102, 102, 102, 0.7);
                text-align: center;
                border: 5px solid #024c7c;
                font-family:'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif
            }
            input {
                display: block;
                margin: 10px 0 0;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
                width: 100%;
                margin: 10px;
            }
            button {
                background-color: #024c7c;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                margin: 10px;
            }
            button:hover {
                background-color: #002842;
            }
            h1 {
                color: #ffffff;
            }
            .flexbox {
                display: flex;
                justify-content: space-between;
            }
            #output {
                background-color: #ffffff;
                padding: 30px;
                border-radius: 10px;
            }
        </style>
    </head>

    <body>
        <div class="card">
            <script>
                function Ueberprufen() {
                    // Variable
                    var ram = document.getElementById("ram").value;
                    var prozessor = document.getElementById("prozessor").value;
                    var festplatte = document.getElementById("festplatte").value;

                    // if-else
                    if (ram < 2 && prozessor < 1.8 && festplatte < 30) {
                        var req = "Entspricht nicht den Anforderungen ";
                    }
                    if (ram >= 2 && prozessor >= 1.8 && festplatte >= 30) {
                        var req = "Threedim Lite (RAM: 2 GiB, Prozessor: 1.8 GHz, Festplatte: 30 GiB)";
                    }
                    if (ram >= 4 && prozessor >= 2 && festplatte >= 40) {
                        var req = "Threedim Full (RAM: 4 GiB, Prozessor: 2 GHz, Festplatte: 40 GiB)";
                    }
                    if (ram >= 16 && prozessor >= 3 && festplatte >= 120) {
                        var req = "Threedim Prof (RAM: 16 GiB, Prozessor: 3 GHz, Festplatte: 120 GiB)";
                    }

                    // Output
                    document.getElementById("output").innerHTML = req;
                }
            </script>

            <!-- Title -->
            <h1>Systemvoraussetzungen</h1>
            
            <!-- Input -->
            <div class="flexbox">
                <input type="number" id="ram" placeholder="RAM?">
                <input type="number" id="prozessor" placeholder="Prozessor?">
                <input type="number" id="festplatte" placeholder="Festplatte?">
                <button onclick="Ueberprufen()">Überprüfen</button>
            </div>

            <!-- Output -->
            <p id="output">Threedim Lite (RAM: 2 GiB, Prozessor: 1.8 GHz, Festplatte: 30 GiB)<br>Threedim Full (RAM: 4 GiB, Prozessor: 2 GHz, Festplatte: 40 GiB)<br>Threedim Prof (RAM: 16 GiB, Prozessor: 3 GHz, Festplatte: 120 GiB)</p>
        </div>
    </body>
</html>
