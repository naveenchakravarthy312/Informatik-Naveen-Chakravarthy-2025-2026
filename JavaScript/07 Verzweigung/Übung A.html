<!doctype html>
<html lang="de">
    <head>
        <!-- Meta -->
        <meta charset="utf-8">
        <title>True/False</title>
        <meta name="author" content="Naveen Chakravarthy Mohankumar">
        <meta name="date" content="11.05.2026">

        <!-- Style -->
        <style>
            .card {
                background: #357096;
                border-radius: 12px;
                padding: 20px;
                margin: 15px;
                box-shadow: 2px 2px 4px rgba(102, 102, 102, 0.7);
                text-align: center;
                border: 5px solid #024c7c;
            }
            input {
                display: block;
                margin: 10px 0 0;
                padding: 8px;
                border: 1px solid #ccc;
                border-radius: 4px;
                width: 100%;
            }
            button {
                background-color: #024c7c;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                cursor: pointer;
                margin: 10px;
            }
            button:hover {
                background-color: #002842;
            }
            h1 {
                color: #ffffff;
            }
        </style>
    </head>

    <body>
        <div class="card">

            <!-- Title -->
            <h1>Geschlecht</h1>
            <script>
                function Geschlecht() {

                    // Variable
                    var Mann = document.getElementById("mann") .checked;
                    var Frau = document.getElementById("frau") .checked;
                    var Name = document.getElementById("name").value;

                    // if-else
                    if (Mann == true) {
                        document.getElementById("output").innerHTML = "Sehr geehrter Herr " + Name;
                    }
                    else if (Frau == true) {
                        document.getElementById("output").innerHTML = "Sehr geehrte Frau " + Name;
                    }
                }
            </script>

            <!-- Input -->
            <input type="radio" id="mann" name="geschlecht">Mann<br>
            <input type="radio" id="frau" name="geschlecht">Frau<br>
            <input type="text" id="name" placeholder="Name?">
            <button onclick= "Geschlecht()">Hochladen</button>

            <!-- Output -->
            <p id="output"></p>
        </div>
    </body>
</html>
