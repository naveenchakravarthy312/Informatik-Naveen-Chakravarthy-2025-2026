<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <title>Fahrenheit und Celsius</title>
        <meta name="author" content="Naveen Chakravarthy Mohankumar">
        <meta name="date" content="01.05.2026">
    </head>

    <body>
        <script>
            // Werten
            var a = 3
            var b = 5
            var c = 1

            // Lösung
            var x1 = (-b + Math.sqrt(Math.pow(b, 2) - 4 * a * c)) / (2 * a);
            var x2 = (-b - Math.sqrt(Math.pow(b, 2) - 4 * a * c)) / (2 * a);

            // Rundung auf zwei Nachkommastellen
            x1 = x1.toFixed(2);
            x2 = x2.toFixed(2);

            // Ausgabe
            document.write("x₁ = " + x1 + "<br>");
            document.write("x2 = " + x2);
        </script>
    </body>
</html>
