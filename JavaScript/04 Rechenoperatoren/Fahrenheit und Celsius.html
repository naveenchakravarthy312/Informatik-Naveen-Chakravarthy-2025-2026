<!doctype html>
<html lang="de">
    <head>
        <meta charset="utf-8">
        <title>Fahrenheit und Celsius</title>
        <meta name="author" content="Naveen Chakravarthy Mohankumar">
        <meta name="date" content="01.05.2026">
    </head>

    <body>
        <script>
            // Wertem
            var c = 45

            // Rechnung
            var f = (c * 1.8) + 32

            // Ausgabe
            document.write(f + " °F sind " + c + " °C.")
        </script>
    </body>
